<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VIP Masterclass: B1+ Public Speaking">
    <title>Masterclass: VIP Public Speaking (B1+)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 50: '#e6e9ef', 100: '#b0b9cb', 200: '#8b9bb4', 300: '#657d9c', 400: '#486283', 500: '#2a4365', 600: '#233855', 700: '#1b2d44', 800: '#112240', 900: '#0A192F' },
                        gold: { 50: '#fcfaf7', 100: '#f9f6f0', 200: '#f0e8d9', 300: '#e6d5b8', 400: '#d4bd94', 500: '#C5A880', 600: '#b39162', 700: '#9b8464', 800: '#826f55', 900: '#6a5a46' },
                        jewel: { rose: '#e11d48', amethyst: '#8b5cf6', emerald: '#10b981', sapphire: '#0ea5e9' }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in-down': 'fadeInDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shake': 'shake 0.5s ease-in-out',
                        'wave': 'wave 1s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeInUp: { '0%': { opacity: '0', transform: 'translateY(40px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        fadeInDown: { '0%': { opacity: '0', transform: 'translateY(-40px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        shake: { '0%, 100%': { transform: 'translateX(0)' }, '20%, 60%': { transform: 'translateX(-8px)' }, '40%, 80%': { transform: 'translateX(8px)' } },
                        wave: { '0%, 100%': { height: '8px' }, '50%': { height: '32px' } }
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; overflow: hidden; }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4bd94; border-radius: 10px; }
        .progress-ring__circle { transition: stroke-dashoffset 1s linear; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); }
        .bg-grid-pattern { background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px); background-size: 40px 40px; }
        
        /* Wave delays */
        .wave-bar:nth-child(1) { animation-delay: 0.0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // =====================================================================
        // 0. ERROR BOUNDARY
        // =====================================================================
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) { console.error("Slide Error:", error); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="glass-panel p-10 rounded-[2rem] w-full max-w-lg mx-auto text-center border-t-8 border-rose-500 shadow-xl animate-fade-in-up shrink-0">
                            <h3 className="text-2xl font-bold text-navy-900 mb-2">Module Error</h3>
                            <p className="text-gray-600 mb-6">A component failed to load. You can safely continue.</p>
                            <button onClick={() => this.setState({ hasError: false })} className="px-6 py-2 bg-navy-900 text-white rounded-xl">Retry</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // =====================================================================
        // 1. AUDIO SYSTEM & TTS
        // =====================================================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const playSound = (type) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if(type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.exponentialRampToValueAtTime(1046.50, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if(type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if(type === 'tick') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if(type === 'fanfare') {
                [523.25, 659.25, 783.99].forEach(freq => { 
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = 'square';
                    o.frequency.setValueAtTime(freq, now); o.connect(g); g.connect(audioCtx.destination);
                    g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                    o.start(now); o.stop(now + 1.5);
                });
            }
        };

        const speakText = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; utterance.rate = 0.85; 
                const voices = window.speechSynthesis.getVoices();
                const englishVoice = voices.find(v => v.lang.includes('en-US') && v.name.includes('Female')) || voices.find(v => v.lang.includes('en'));
                if (englishVoice) utterance.voice = englishVoice;
                window.speechSynthesis.speak(utterance);
            }
        };

        // =====================================================================
        // 2. SVG ICONS
        // =====================================================================
        const Icons = {
            Volume: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>,
            Check: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>,
            X: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Menu: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>,
            ChevronRight: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>,
            ChevronLeft: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Star: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>,
            Camera: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
            Globe: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            Mic: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>,
            Smartphone: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>,
            Award: ({ size=40, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>,
            Refresh: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>,
            BookOpen: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            Lightbulb: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>,
            Lock: ({ size=16, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            User: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Headphones: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>,
            Heart: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>,
            Activity: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>,
            Smile: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" x1="9.01" y1="9" y2="9"></line><line x1="15" x1="15.01" y1="9" y2="9"></line></svg>
        };

        // =====================================================================
        // 3. REUSABLE UI COMPONENTS
        // =====================================================================
        const TTSButton = ({ text, className="" }) => (
            <button onClick={(e) => { e.stopPropagation(); speakText(text); }} className={`p-3 rounded-full transition-all duration-300 hover:scale-110 active:scale-95 flex-shrink-0 shadow-sm ${className}`} title="Listen"><Icons.Volume size={20} /></button>
        );

        const Button = ({ children, onClick, disabled, variant='primary', className="", icon: Icon }) => {
            const base = "flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold transition-all duration-300 shadow-sm active:scale-95 disabled:opacity-50 disabled:pointer-events-none";
            const variants = {
                primary: "bg-navy-900 text-white hover:shadow-lg hover:-translate-y-0.5 border border-transparent",
                secondary: "bg-gold-500 text-navy-900 hover:shadow-lg border border-transparent",
                outline: "border-2 border-navy-900 text-navy-900 hover:bg-navy-50",
                ghost: "bg-transparent text-gray-600 shadow-none hover:bg-white hover:text-navy-900"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>
                    {children} {Icon && <Icon size={20} />}
                </button>
            );
        };

        const Badge = ({ children, color="navy" }) => {
            const colors = { navy: "bg-navy-100 text-navy-800", gold: "bg-gold-100 text-gold-800", emerald: "bg-emerald-100 text-emerald-800", rose: "bg-rose-100 text-rose-800", purple: "bg-purple-100 text-purple-800" };
            return <span className={`inline-flex items-center px-3 py-1 rounded-full text-xs font-bold tracking-widest uppercase shadow-sm ${colors[color]}`}>{children}</span>;
        };

        const Chunk = ({ children, color="navy" }) => {
            const colors = { navy: "bg-navy-100 text-navy-900 border-navy-300", gold: "bg-gold-100 text-gold-900 border-gold-300", emerald: "bg-emerald-100 text-emerald-900 border-emerald-300", rose: "bg-rose-100 text-rose-900 border-rose-300", purple: "bg-purple-100 text-purple-900 border-purple-300" };
            return <span className={`inline-block px-2 py-0.5 mx-1 rounded-lg font-bold border shadow-sm ${colors[color]}`}>{children}</span>;
        };

        // =====================================================================
        // 4. INTERACTIVE MODULES
        // =====================================================================

        // 4.1 Pronunciation & Speaking Practice Clinic
        const PronunciationPractice = ({ title, context, phrases }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [isRecording, setIsRecording] = useState(false);
            const [feedback, setFeedback] = useState(null);

            const phrase = phrases[currentIdx] || phrases[0];

            const handleRecord = () => {
                setIsRecording(true); setFeedback(null);
                setTimeout(() => {
                    setIsRecording(false);
                    const feedbacks = [
                        { msg: "Excellent rhythm and intonation! 🌟", type: 'perfect' },
                        { msg: "Great! Keep practicing the pause.", type: 'good' },
                        { msg: "Nailed it! Sounded completely natural.", type: 'perfect' }
                    ];
                    setFeedback(feedbacks[Math.floor(Math.random() * feedbacks.length)]);
                    playSound('correct');
                }, 3000);
            };

            const nextPhrase = () => { setCurrentIdx((prev) => (prev + 1) % phrases.length); setFeedback(null); };

            if (!phrase) return null;

            return (
                <div className="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-xl border-t-8 border-jewel-sapphire relative overflow-hidden w-full max-w-4xl mx-auto shrink-0">
                    <div className="text-center mb-8 relative z-10">
                        <Badge color="navy">Speaking Clinic</Badge>
                        <h3 className="text-3xl font-extrabold text-navy-900 mt-4 mb-2">{title}</h3>
                        <p className="text-gray-600">{context}</p>
                    </div>

                    <div className="bg-white/80 p-8 rounded-3xl shadow-sm border border-gray-100 text-center mb-8 min-h-[200px] flex flex-col justify-center shrink-0">
                        <p className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Phrase {currentIdx + 1} of {phrases.length}</p>
                        <p className="text-2xl md:text-4xl font-light text-navy-900 leading-relaxed mb-4" dangerouslySetInnerHTML={{ __html: phrase.html }}></p>
                        {phrase.tip && <p className="text-jewel-sapphire text-sm font-bold bg-blue-50 inline-block px-4 py-2 rounded-full mx-auto">💡 Tip: {phrase.tip}</p>}
                    </div>

                    <div className="flex flex-col md:flex-row items-center justify-center gap-6">
                        <button onClick={() => speakText(phrase.raw)} className="flex flex-col items-center gap-2 text-navy-600 hover:text-navy-900 transition-colors">
                            <div className="w-16 h-16 rounded-full bg-navy-50 flex items-center justify-center border-2 border-navy-200 hover:bg-navy-100 hover:scale-105 transition-transform"><Icons.Headphones size={28} /></div>
                            <span className="font-bold text-sm uppercase tracking-wide">1. Listen</span>
                        </button>
                        <div className="hidden md:block w-16 border-t-2 border-dashed border-gray-300"></div>
                        <div className="flex flex-col items-center gap-2">
                            <button onClick={handleRecord} disabled={isRecording} className={`w-20 h-20 rounded-full flex items-center justify-center text-white transition-all duration-300 shadow-xl ${isRecording ? 'bg-jewel-rose scale-110 animate-pulse' : 'bg-gradient-to-br from-navy-800 to-navy-900 hover:scale-105'}`}>
                                {isRecording ? (
                                    <div className="flex gap-1 items-center justify-center h-8">
                                        <div className="w-1.5 bg-white rounded-full animate-wave wave-bar h-2"></div>
                                        <div className="w-1.5 bg-white rounded-full animate-wave wave-bar h-8"></div>
                                        <div className="w-1.5 bg-white rounded-full animate-wave wave-bar h-4"></div>
                                        <div className="w-1.5 bg-white rounded-full animate-wave wave-bar h-6"></div>
                                    </div>
                                ) : <Icons.Mic size={32} />}
                            </button>
                            <span className={`font-bold text-sm uppercase tracking-wide ${isRecording ? 'text-jewel-rose' : 'text-gray-600'}`}>{isRecording ? 'Listening...' : '2. Speak'}</span>
                        </div>
                    </div>

                    <div className="mt-8 min-h-[80px] flex flex-col items-center justify-center shrink-0">
                        {feedback && (
                            <div className="animate-fade-in-up flex flex-col items-center">
                                <div className="px-6 py-3 rounded-xl font-bold mb-4 flex items-center gap-2 bg-emerald-100 text-emerald-800 border border-emerald-200 shadow-sm"><Icons.Check size={20} /> {feedback.msg}</div>
                                <Button onClick={nextPhrase} variant="outline" className="text-sm px-4 py-2">Next Phrase <Icons.ChevronRight size={16} /></Button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 4.2 Press Conference Simulator
        const PressSimulator = ({ questions }) => {
            const [isActive, setIsActive] = useState(false);
            const [time, setTime] = useState(60);
            const [currentPrompt, setCurrentPrompt] = useState(questions[0] || "");
            
            const radius = 60;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (time / 60) * circumference;

            useEffect(() => {
                let interval;
                if (isActive && time > 0) {
                    interval = setInterval(() => {
                        setTime(t => {
                            if (t <= 5 && t > 1) playSound('tick');
                            if (t === 1) playSound('wrong'); 
                            return t - 1;
                        });
                    }, 1000);
                } else if (time === 0) setIsActive(false);
                return () => clearInterval(interval);
            }, [isActive, time]);

            const startSimulation = () => {
                let nextQ;
                do { nextQ = questions[Math.floor(Math.random() * questions.length)]; } 
                while(nextQ === currentPrompt && questions.length > 1);
                setCurrentPrompt(nextQ); setTime(60); setIsActive(true);
            };

            return (
                <div className="bg-navy-900 text-white p-8 md:p-14 rounded-[3rem] shadow-2xl flex flex-col items-center text-center relative w-full max-w-4xl mx-auto border-t-8 border-rose-500 shrink-0">
                    <Icons.Camera size={64} className="text-rose-500 mb-4 animate-pulse shrink-0" />
                    <Badge color="rose">Live Press Conference</Badge>
                    
                    <div className="w-full flex items-center justify-center my-8 px-4 shrink-0">
                        <p className="text-2xl md:text-4xl font-light leading-relaxed">"{currentPrompt}"</p>
                    </div>
                    
                    <div className="relative w-40 h-40 mb-10 flex items-center justify-center shrink-0">
                        <svg className="absolute top-0 left-0 w-full h-full" viewBox="0 0 140 140">
                            <circle cx="70" cy="70" r={radius} stroke="rgba(255,255,255,0.1)" strokeWidth="8" fill="none" />

        // 4.3 Teleprompter
        const Teleprompter = ({ text }) => {
            const [isPlaying, setIsPlaying] = useState(false);
            const contentRef = useRef(null);

                let interval;
                if (isPlaying && contentRef.current) {
                    interval = setInterval(() => {
                        contentRef.current.scrollTop += 1.5;
                        if (contentRef.current.scrollTop >= (contentRef.current.scrollHeight - contentRef.current.clientHeight)) {
                            setIsPlaying(false); playSound('fanfare');
                        }
                    }, 40); 
                }
                return () => clearInterval(interval);
            }, [isPlaying]);

            return (
                <div className="bg-black p-6 md:p-8 rounded-3xl w-full max-w-4xl mx-auto border-4 border-gray-800 shadow-2xl relative shrink-0">
                    <div className="flex justify-between items-center mb-6">
                        <Badge color="emerald">Teleprompter View</Badge>
                        <Button onClick={() => setIsPlaying(!isPlaying)} className={isPlaying ? 'bg-rose-600 text-white' : 'bg-emerald-500 text-navy-900'}>{isPlaying ? 'Pause' : 'Start'}</Button>
                    </div>
                    <div className="h-[400px] overflow-hidden relative border-t-2 border-b-2 border-white/10 shrink-0">

        // 4.4 Flashcards
        const FlashcardDeck = ({ cards, deckName }) => {
            const [currentIndex, setCurrentIndex] = useState(0);

            const card = cards[currentIndex] || cards[0];

            if (!card) return null;

            return (

        // 4.5 Word Builder
        const WordBuilder = ({ title, phrase, expectedWords }) => {
            const [slots, setSlots] = useState(Array(expectedWords.length).fill(null));
            const [bank, setBank] = useState([]);
            const [status, setStatus] = useState(null);

            useEffect(() => {
                const distractors = ["happy", "coming", "there", "proudly"];
                const allWords = [...expectedWords, ...distractors].sort(() => Math.random() - 0.5);
                setBank(allWords); setSlots(Array(expectedWords.length).fill(null)); setStatus(null);
            }, [phrase]);

            const handleBankClick = (word, bankIdx) => {
                if(status === 'success') return;
                const firstEmptySlot = slots.indexOf(null);
                if (firstEmptySlot !== -1) {
                    playSound('tick'); const newSlots = [...slots]; newSlots[firstEmptySlot] = word;
                    setSlots(newSlots); setBank(bank.filter((_, i) => i !== bankIdx)); setStatus(null);
                }
            };

            const handleSlotClick = (word, slotIdx) => {
                if(status === 'success' || !word) return;
                playSound('tick'); const newSlots = [...slots]; newSlots[slotIdx] = null;
                setSlots(newSlots); setBank([...bank, word]); setStatus(null);
            };

            const checkAnswer = () => {
                if (slots.includes(null)) return;
                const isCorrect = slots.every((word, idx) => word === expectedWords[idx]);
                if (isCorrect) { setStatus('success'); playSound('correct'); } else { setStatus('error'); playSound('wrong'); }
            };

            const parts = phrase.split(/\{(\d+)\}/g);

            return (
                <div className="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-xl w-full max-w-4xl mx-auto text-center border-t-8 border-jewel-amethyst animate-fade-in-up shrink-0">
                    <Icons.Smartphone size={48} className="mx-auto text-jewel-amethyst mb-4" />
                    <h3 className="text-2xl font-bold text-navy-900 mb-2">{title}</h3>
                    <p className="text-gray-500 mb-10">Tap the words in the word bank below to fill in the blanks and create the perfect statement.</p>

                    <div className={`p-6 md:p-8 bg-white rounded-2xl shadow-sm mb-8 leading-loose text-xl md:text-2xl font-light text-navy-900 border-2 transition-colors shrink-0 ${status === 'success' ? 'border-emerald-500 bg-emerald-50' : status === 'error' ? 'border-rose-500 animate-shake' : 'border-gray-200'}`}>
                        {parts.map((part, idx) => {
                            if (!isNaN(part)) {
                                const slotIdx = parseInt(part); const word = slots[slotIdx];
                                return (
                                    <span key={idx} onClick={() => handleSlotClick(word, slotIdx)}
                                        className={`inline-block min-w-[100px] px-3 md:px-4 py-1 md:py-2 mx-1 md:mx-2 text-center rounded-xl font-bold cursor-pointer transition-all border-b-4
                                            ${word ? 'bg-navy-900 text-white border-navy-700 shadow-md transform hover:-translate-y-1' : 'bg-gray-100 text-transparent border-gray-300'}`}
                                    >
                                        {word || "___"}
                                    </span>
                                );
                            }
                            return <span key={idx}>{part}</span>;
                        })}
                    </div>

                    <div className="flex flex-wrap justify-center gap-2 md:gap-3 mb-10 min-h-[60px] shrink-0">
                        {bank.map((word, idx) => (
                            <button key={idx} onClick={() => handleBankClick(word, idx)} className="px-4 py-2 bg-white border border-gray-300 text-navy-800 rounded-full font-bold shadow-sm hover:shadow-md hover:border-jewel-amethyst transition-all active:scale-95 text-sm md:text-base">
                                {word}
                            </button>
                        ))}
                    </div>

                    {status === 'success' ? (
                        <div className="bg-emerald-100 text-emerald-800 font-bold p-4 rounded-xl inline-flex items-center gap-2 shrink-0"><Icons.Check/> Perfect!</div>
                    ) : (
                        <Button onClick={checkAnswer} variant="primary" disabled={slots.includes(null)} className="mx-auto shrink-0">Check Statement</Button>
                    )}
                </div>
            );
        };

        const Confetti = () => {

                        <div className="bg-white/80 p-8 rounded-3xl text-left border border-white shadow-lg flex justify-center">
                            <div>
                                <h4 className="font-bold text-navy-900 mb-4 uppercase text-sm tracking-widest border-b-2 border-gold-400 pb-2">Mastered Lexical Chunks</h4>
                                <ul className="space-y-4 text-gray-800 font-medium text-lg">
                                    <li className="flex items-center gap-3"><Icons.Check className="text-emerald-500"/> <em>"That's a great question, but I want to focus on..."</em></li>
                                    <li className="flex items-center gap-3"><Icons.Check className="text-emerald-500"/> <em>"If you'll excuse me..."</em></li>
                                    <li className="flex items-center gap-3"><Icons.Check className="text-emerald-500"/> <em>"To raise awareness & make a difference."</em></li>
                                    <li className="flex items-center gap-3"><Icons.Check className="text-emerald-500"/> <em>"I am so grateful for this opportunity."</em></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                ),
                note: "Incredible work! For homework, have the student record a 1-minute video using their phone, giving a mock press statement utilizing at least 3 Chunks from today's class."
            }
        ];

        // =====================================================================
        // 6. APPLICATION SHELL
        // =====================================================================
        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const [showNotes, setShowNotes] = useState(false);
            const [showMenu, setShowMenu] = useState(false);
            const [maxUnlocked, setMaxUnlocked] = useState(0);
            const mainRef = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem('vipDiplomacyB1');
                if (saved) {
                    const parsed = parseInt(saved, 10);
                    setMaxUnlocked(parsed); setCurrentSlide(parsed);
                }
            }, []);

            useEffect(() => {
                if (currentSlide > maxUnlocked) {
                    setMaxUnlocked(currentSlide);
                    localStorage.setItem('vipDiplomacyB1', currentSlide);
                }
                if (mainRef.current) mainRef.current.scrollTo({ top: 0, behavior: 'smooth' });
            }, [currentSlide, maxUnlocked]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight' && currentSlide < MASTERCLASS_DATA.length - 1) setCurrentSlide(p => p + 1);
                    if (e.key === 'ArrowLeft' && currentSlide > 0) setCurrentSlide(p => p - 1);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentSlide]);

            const slide = MASTERCLASS_DATA[currentSlide];

            return (
                <div className="h-[100dvh] flex flex-col font-sans overflow-hidden bg-grid-pattern bg-gray-50">
                    
                    {/* Header */}
                    <header className="bg-navy-900 text-white h-20 flex items-center justify-between px-6 md:px-10 shadow-xl z-40 relative">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowMenu(!showMenu)} className="p-2 hover:bg-navy-800 rounded-xl transition-colors"><Icons.Menu size={28} /></button>
                            <h1 className="font-bold text-xl tracking-wide hidden md:block">VIP Speaking (B1+)</h1>
                        </div>
                        <div className="flex-1 max-w-xl mx-8 hidden sm:block">
                            <div className="bg-navy-800 h-3 rounded-full overflow-hidden shadow-inner border border-navy-700">
                                <div className="bg-gradient-to-r from-gold-400 to-emerald-400 h-full transition-all duration-700 ease-out" style={{ width: `${((currentSlide + 1) / MASTERCLASS_DATA.length) * 100}%` }}></div>
                            </div>
                        </div>
                        <button onClick={() => setShowNotes(!showNotes)} className={`px-5 py-2.5 text-sm font-bold rounded-xl transition-all border-2 flex items-center gap-2 ${showNotes ? 'bg-gold-500 text-navy-900 border-gold-500' : 'text-gold-500 border-gold-500 hover:bg-gold-500/10'}`}>
                            <Icons.BookOpen size={18}/> <span className="hidden sm:inline">Teacher Notes</span>
                        </button>
                    </header>

                    {/* Main Layout */}
                    <div className="flex flex-1 relative overflow-hidden">
                        
                        {/* Sidebar Menu */}
                        <div className={`absolute top-0 left-0 h-full w-80 bg-white/95 backdrop-blur-md shadow-2xl z-30 transition-transform duration-300 flex flex-col border-r border-gray-200 ${showMenu ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="p-6 h-full overflow-y-auto space-y-2">
                                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Course Modules</h3>
                                {MASTERCLASS_DATA.map((item, idx) => {
                                    const isLocked = idx > maxUnlocked;
                                    return (
                                        <button key={item.id} onClick={() => { setCurrentSlide(idx); setShowMenu(false); }} disabled={isLocked}
                                            className={`w-full text-left p-4 rounded-2xl text-sm transition-all flex items-center gap-3 ${currentSlide === idx ? 'bg-navy-900 text-white font-bold shadow-lg' : isLocked ? 'opacity-50 text-gray-400 bg-gray-50' : 'hover:bg-gray-100 text-navy-800'}`}
                                        >
                                            <div className={`flex items-center justify-center w-8 h-8 rounded-full text-xs font-bold shrink-0 ${currentSlide === idx ? 'bg-gold-500 text-navy-900' : 'bg-gray-200 text-gray-600'}`}>{isLocked ? <Icons.Lock/> : idx + 1}</div>
                                            <span className="truncate">{item.title}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        {showMenu && <div className="absolute inset-0 bg-navy-900/30 backdrop-blur-sm z-20" onClick={() => setShowMenu(false)}></div>}

                        {/* Slide Content */}
                        <main ref={mainRef} className="flex-1 overflow-y-auto px-4 sm:px-8 pt-12 pb-32 flex flex-col items-center relative z-10">
                            <div className="w-full shrink-0 flex flex-col items-center">
                                <div className="text-center mb-12 animate-fade-in-down shrink-0">
                                    <Badge color="gold">Module {currentSlide + 1} • {slide.subtitle}</Badge>
                                    <h2 className="text-4xl md:text-6xl font-extrabold text-navy-900 mt-6 tracking-tight">{slide.title}</h2>
                                </div>
                                
                                <div className="w-full max-w-5xl shrink-0">
                                    <ErrorBoundary key={slide.id}>
                                        {slide.content()}
                                    </ErrorBoundary>
                                </div>
                            </div>
                        </main>

                        {/* Teacher Notes Panel */}
                        <aside className={`w-80 md:w-96 bg-white/95 backdrop-blur-md border-l border-gray-200 shadow-2xl z-20 transition-transform duration-300 absolute right-0 h-full flex flex-col p-8 ${showNotes ? 'translate-x-0' : 'translate-x-full'}`}>
                            <h3 className="text-xl font-extrabold text-navy-900 border-b-2 border-gold-500 pb-4 mb-8 flex items-center gap-3"><Icons.Lightbulb/> Pedagogical Guide</h3>
                            <div className="bg-gray-50 p-6 rounded-3xl border border-gray-200 flex-1 overflow-y-auto relative text-navy-800 leading-relaxed text-sm">
                                <div className="absolute top-0 left-0 w-1.5 h-full bg-gold-400 rounded-l-3xl"></div>
                                <strong className="block text-gold-600 mb-2 uppercase tracking-widest text-xs">Slide Instructions:</strong>
                                {slide.note}
                            </div>
                        </aside>

                    </div>

                    {/* Footer Nav */}
                    <footer className="bg-white/90 backdrop-blur-md border-t border-gray-200 h-24 px-6 md:px-10 flex justify-between items-center z-40 relative">
                        <Button onClick={() => setCurrentSlide(p => Math.max(p - 1, 0))} disabled={currentSlide === 0} variant="ghost" className="border-2 border-gray-200 bg-white"><Icons.ChevronLeft/> <span className="hidden md:inline">Previous</span></Button>
                        <div className="hidden lg:flex gap-2">
                            {MASTERCLASS_DATA.map((_, idx) => (
                                <div key={idx} className={`h-3 rounded-full transition-all duration-500 ${idx === currentSlide ? 'w-12 bg-gold-500' : idx <= maxUnlocked ? 'w-3 bg-navy-200 cursor-pointer hover:bg-navy-400' : 'w-3 bg-gray-200'}`} onClick={() => idx <= maxUnlocked && setCurrentSlide(idx)}></div>
                            ))}
                        </div>
                        <Button onClick={() => setCurrentSlide(p => Math.min(p + 1, MASTERCLASS_DATA.length - 1))} disabled={currentSlide === MASTERCLASS_DATA.length - 1} className="bg-navy-900 text-white px-8"><span className="hidden md:inline">Continue</span> <Icons.ChevronRight/></Button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
